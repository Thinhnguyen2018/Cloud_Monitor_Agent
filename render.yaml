services:
  - type: web
    name: greennode-agent
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app -w 2 -b 0.0.0.0:$PORT --timeout 60
    envVars:
      - key: GN_MAAS_API_KEY
        sync: false
      - key: GN_MAAS_MODEL
        value: google/gemma-4-31b-it
      - key: TEAMS_GN_CLIENT_ID
        sync: false
      - key: TEAMS_GN_CLIENT_SECRET
        sync: false
      - key: TEAMS_GN_PROJECT_ID
        sync: false
      - key: AZURE_APP_ID
        sync: false
      - key: AZURE_APP_PASSWORD
        sync: false
      - key: FLASK_SECRET_KEY
        generateValue: true
